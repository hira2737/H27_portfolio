<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Glass cyan H">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071432" />
      <stop offset="100%" stop-color="#112240" />
    </linearGradient>
    <linearGradient id="letterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="70%" stop-color="#0bb6ff" />
      <stop offset="100%" stop-color="#0a9ddc" />
    </linearGradient>
    <filter id="neonGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="glassHighlight" cx="30%" cy="20%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)" />
      <stop offset="40%" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bgGradient)" />
  <rect x="12" y="12" width="104" height="104" rx="24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
  <rect x="22" y="18" width="84" height="32" rx="16" fill="url(#glassHighlight)" opacity="0.6" />
  <rect x="22" y="78" width="84" height="20" rx="10" fill="rgba(255,255,255,0.1)" />

  <g filter="url(#neonGlow)">
    <rect x="34" y="26" width="14" height="62" rx="6" fill="url(#letterGradient)" />
    <rect x="80" y="26" width="14" height="62" rx="6" fill="url(#letterGradient)" />
    <rect x="34" y="56" width="60" height="16" rx="8" fill="url(#letterGradient)" />
  </g>
</svg>
